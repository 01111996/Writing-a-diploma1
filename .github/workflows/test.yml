name: E2E Tests (Docker Compose + Selenium)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg curl unzip jq

          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update

          sudo apt-get install -y google-chrome-stable

          sudo rm -rf /var/lib/apt/lists/*

          google-chrome --version

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: Build and start infrastructure
        working-directory: project
        run: docker compose up -d --build

      - name: Wait for gate-simulator (port 9999)
        run: |
          echo "Waiting for gate-simulator..."
          for i in $(seq 1 45); do
            if curl -s "http://localhost:9999" -o /dev/null 2>&1; then
              echo "Gate-simulator ready after $((i*2)) seconds"
              break
            fi
            echo "  Attempt $i/45..."
            sleep 2
          done
          if ! curl -s "http://localhost:9999" -o /dev/null 2>&1; then
            echo "Gate-simulator failed to start:"
            cd project && docker compose logs gate-simulator
            exit 1
          fi

      - name: Wait for aqa-shop to be stable (port 8080)
        working-directory: project
        env:
          BASE_URL: http://localhost:8080
        run: |
          echo "Waiting for aqa-shop to be stable..."
          HEALTHY=0
          for i in $(seq 1 90); do
            if curl -sf "$BASE_URL" > /dev/null 2>&1; then
              HEALTHY=$((HEALTHY + 1))
              echo "  OK $HEALTHY/3 (attempt $i)"
              if [ "$HEALTHY" -ge 3 ]; then
                echo "aqa-shop is stable!"
                break
              fi
            else
              HEALTHY=0
              echo "  Attempt $i/90 failed — resetting counter"
            fi
            sleep 2
          done

          if [ "$HEALTHY" -lt 3 ]; then
            echo "aqa-shop did not become stable. Logs:"
            docker compose logs aqa-shop
            docker compose logs gate-simulator
            exit 1
          fi

          echo "Extra 5s buffer..."
          sleep 5

      - name: Run Pytest
        env:
          BASE_URL: http://localhost:8080
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: app
          DB_USER: app
          DB_PASSWORD: pass
        run: |
          pytest --alluredir=allure-results -v

      - name: Dump Docker logs on failure
        if: failure()
        working-directory: project
        run: |
          echo "=== aqa-shop logs ==="
          docker compose logs aqa-shop
          echo "=== gate-simulator logs ==="
          docker compose logs gate-simulator
          echo "=== db logs ==="
          docker compose logs db

      - name: Install and Generate Allure Report
        if: always()
        continue-on-error: true
        run: |
          curl -o /tmp/allure-2.25.0.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -zxf /tmp/allure-2.25.0.tgz -C "$HOME"
          export PATH="$PATH:$HOME/allure-2.25.0/bin"
          allure generate ./allure-results --clean -o ./allure-report

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            project/tests/screenshots/*.png
            project/tests/screenshots/*.html
            allure-report/
