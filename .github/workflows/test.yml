name: E2E Tests (Docker Compose + Selenium)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    
    services:
      docker:
        image: docker:dind
        privileged: true
        options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      
      - name: Install dependencies and Chrome
        run: |
          apt-get update
          apt-get install -y wget gnupg curl unzip jq
          
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb stable main" > /etc/apt/sources.list.d/google-chrome.list
          apt-get update
          apt-get install -y google-chrome-stable

      - name: Start Docker daemon
        run: service docker start

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: Build and start infrastructure
        run: |
          docker compose up -d --build --wait

      - name: Wait for application to be ready via HTTP
        run: |
          for i in {1..30}; do
            if curl -f -s http://localhost:8080; then
              echo "Application is healthy!"
              break
            fi
            sleep 2
          done
          if ! curl -f -s http://localhost:8080; then
            echo "Application failed to start. Dumping logs:"
            docker compose logs aqa-shop
            exit 1
          fi

      - name: Run Pytest
        env:
          BASE_URL: http://localhost:8080
          DB_HOST: db
          DB_PORT: 3306
          DB_NAME: aqa_shop_db
          DB_USER: user
          DB_PASSWORD: password
        run: |
          pytest --alluredir=allure-results -n auto

      
      - name: Install and Generate Allure Report
        if: always()
        continue-on-error: true
        run: |
          wget https://raw.githubusercontent.com/qameta/allure-commandline/master/bin/install.sh -O /tmp/install-allure.sh
          chmod +x /tmp/install-allure.sh
          /tmp/install-allure.sh 2.25.0 

          export PATH="$PATH:$HOME/allure-2.25.0/bin"
          
          allure generate ./allure-results --clean -o ./allure-report

      
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Results & Screenshots
          path: |
            allure-report/
            *.png