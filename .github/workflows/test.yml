name: E2E Tests (Docker Compose + Selenium)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg curl unzip jq

          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update

          sudo apt-get install -y google-chrome-stable chromium-chromedriver

          sudo rm -rf /var/lib/apt/lists/*

          google-chrome --version
          chromedriver --version

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('project/gate-simulator/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: Build and start infrastructure
        working-directory: project
        run: |
          docker compose up -d --build --wait

      - name: Wait for Infrastructure to be Ready
        working-directory: project
        env:
          BASE_URL: http://localhost:8080
        run: |
          for i in {1..30}; do
            if curl -f -s "$BASE_URL"; then
              echo "Application is healthy!"
              break
            fi
            sleep 2
          done
          if ! curl -f -s "$BASE_URL"; then
            echo "Application failed to start. Dumping logs:"
            docker compose logs aqa-shop
            exit 1
          fi
          for i in {1..30}; do
            if docker exec db mysqladmin ping -h"db" --silent; then
              echo "Database is healthy!"
              break
            fi
            sleep 2
          done
          if ! docker exec db mysqladmin ping -h"db" --silent; then
            echo "Database failed to respond after 60 seconds."
            exit 1
          fi

      - name: Run Pytest
        env:
          BASE_URL: http://localhost:8080
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: app
          DB_USER: app
          DB_PASSWORD: pass
        run: |
          pytest --alluredir=allure-results -n auto

      - name: Install and Generate Allure Report
        if: always()
        continue-on-error: true
        run: |
          curl -o /tmp/allure-2.25.0.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -zxf /tmp/allure-2.25.0.tgz -C "$HOME"

          export PATH="$PATH:$HOME/allure-2.25.0/bin"

          allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Results & Debug Info
          path: |
            allure-report/
            logs/*.log
            project/tests/**/screenshot_*.png
            project/tests/screenshots/**/*
            *.png