# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python


name: Lint & Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    env:
      
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Flake8 должен быть в requirements.txt, иначе команда ниже упадет
      
      - name: Lint with Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with Pytest
        run: |
          python -m pytest --rootdir=. --alluredir=./allure-results

      - name: Generate Allure Report
        if: always()
        continue-on-error: true
        run: |
          wget https://raw.githubusercontent.com/qameta/allure-commandline/master/bin/install.sh -O /tmp/install-allure.sh
          chmod +x /tmp/install-allure.sh
          /tmp/install-allure.sh 2.25.0

          export PATH="$PATH:$HOME/allure-2.25.0/bin"
          
          allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Lint and Test Results
          path: |
            allure-report/